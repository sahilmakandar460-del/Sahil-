<!DOCTYPE html>
<html>
<head>
<title>MyCalorie AI Prompts Collection</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f4f6f8;
}
h1 {
    text-align: center;
}
.prompt-box {
    background-color: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}
pre {
    white-space: pre-wrap;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>MyCalorie AI App Prompts</h1>

<div class="prompt-box">
<h2>1. Logo Header Add Prompt</h2>
<pre>
Add app logo to my MyCalorie AI app automatically.

Requirements:

Create header at top.

Allow uploading logo image.

Place logo at center.

Display text:

"MyCalorie AI"

Bold and large size.

Keep spacing clean.

Do not change other features.
</pre>
</div>

<div class="prompt-box">
<h2>2. Privacy Policy Add Prompt</h2>
<pre>
Add Privacy Policy option in Settings screen.

Button Name:

Privacy Policy

When clicked:

Open new screen.

Display privacy text.

Enable scrolling.

Add back button.
</pre>
</div>

<div class="prompt-box">
<h2>3. Back Button Fix Prompt</h2>
<pre>
Add Back Navigation button.

Add back arrow at top-left.

Return to Dashboard.

Apply to:

Saved Meals
Profile
Settings
Weight Tracker
</pre>
</div>

<div class="prompt-box">
<h2>4. Layout Overlap Fix Prompt</h2>
<pre>
Fix overlap between Daily Goal and Water Intake.

Add spacing between cards.

Enable vertical scrolling.

Make height auto-adjust.

Prevent overlap.
</pre>
</div>

<div class="prompt-box">
<h2>5. Target Weight Input Fix</h2>
<pre>
Enable typing in Target Weight field.

Open numeric keyboard.

Allow decimal numbers.

Add Save button.

Store weight in Firebase.

Load saved value on restart.
</pre>
</div>

<div class="prompt-box">
<h2>6. Duplicate Profile Remove Prompt</h2>
<pre>
Remove duplicate profile icon.

Keep only one profile.

Remove email avatar duplicate.

Clean navigation.
</pre>
</div>

<div class="prompt-box">
<h2>7. Logo Security Lock Prompt</h2>
<pre>
Allow only Admin to change logo.

Hide branding options from users.

Verify Admin email.

Prevent users from editing branding.
</pre>
</div>

<div class="prompt-box">
<h2>8. Performance Optimization Prompt</h2>
<pre>
Reduce lag.

Compress images.

Optimize Firebase queries.

Limit data loading.

Use caching.

Improve camera performance.
</pre>
</div>

<div class="prompt-box">
<h2>9. Flashlight Fix Prompt</h2>
<pre>
Enable flashlight toggle.

Tap once: ON

Tap again: OFF

Show message if flashlight unavailable.
</pre>
</div>

<div class="prompt-box">
<h2>10. Achievement Badges Prompt</h2>
<pre>
Add badge system.

First Scan Badge.

7 Day Streak Badge.

Goal Completion Badge.

Food Explorer Badge.

30 Day Champion Badge.
</pre>
</div>

<div class="prompt-box">
<h2>11. AI Nutrition Correction Prompt</h2>
<pre>
Allow editing nutrition values.

Edit:

Calories
Protein
Carbs
Fat

Save corrected values.

Store in Firebase.
</pre>
</div>

<div class="prompt-box">
<h2>12. Firebase Stability Prompt</h2>
<pre>
Enable offline saving.

Retry failed uploads.

Prevent duplicate data.

Secure user data.
</pre>
</div>

</body>
</html>
